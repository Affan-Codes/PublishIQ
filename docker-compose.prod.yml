version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: publishiq-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-publishiq}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d publishiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: publishiq-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: publishiq-api-prod
    restart: unless-stopped
    command: node dist/api.js
    volumes:
      - media_prod_data:/usr/src/app/media
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MEDIA_ROOT=/usr/src/app/media
      - QUEUE_PREFIX=publishiq-prod
      - OPERATOR_EMAIL=${OPERATOR_EMAIL}
      - OPERATOR_PASSWORD=${OPERATOR_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: publishiq-worker-prod
    restart: unless-stopped
    command: node dist/worker.js
    volumes:
      - media_prod_data:/usr/src/app/media
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MEDIA_ROOT=/usr/src/app/media
      - QUEUE_PREFIX=publishiq-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: publishiq-frontend-prod
    restart: unless-stopped
    command: serve -s dist -l 5173
    environment:
      - VITE_API_BASE_URL=/api/v1
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: publishiq-proxy-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  media_prod_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
