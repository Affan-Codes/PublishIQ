version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: publishiq-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: publishiq
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d publishiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: publishiq-redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: publishiq-api
    command: npm run dev
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - media_data:/usr/src/app/media
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/publishiq?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=dev-session-secret-with-32-characters!!
      - ENCRYPTION_KEY=dev-encryption-key-with-32-characters!!
      - LOG_LEVEL=debug
      - MEDIA_ROOT=/usr/src/app/media
      - QUEUE_PREFIX=publishiq
      - OPERATOR_EMAIL=admin@publishiq.com
      - OPERATOR_PASSWORD=admin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: publishiq-worker
    command: npx tsx watch src/worker.ts
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - media_data:/usr/src/app/media
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/publishiq?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=dev-session-secret-with-32-characters!!
      - ENCRYPTION_KEY=dev-encryption-key-with-32-characters!!
      - LOG_LEVEL=debug
      - MEDIA_ROOT=/usr/src/app/media
      - QUEUE_PREFIX=publishiq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: publishiq-frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '5173:5173'
    environment:
      - VITE_API_BASE_URL=http://localhost:4000/api/v1
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_data:
    driver: local
